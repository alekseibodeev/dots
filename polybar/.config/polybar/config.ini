[colors]
background = #103c48
foreground = #abdcbc
primary = #4695f7
success = #75b938
warning = #dbb32d
danger = #fa5750
disabled = #728987

[bar/main]
width = 100%
height = 16pt
radius = 0.0
dpi = 144

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0pt

padding-left = 0
padding-right = 1

module-margin = 1

font-0 = monospace:size=10;4

modules-left = xworkspaces
modules-center = date
modules-right = xkeyboard pulseaudio battery wlan eth

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.warning}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
date = %a, %B %d
time = %H:%M
label = 󰃭 %date%  󰥔 %time%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = "󰌌 "

label-layout = %layout%

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.warning}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume>  <label-volume>
format-muted = <label-muted>

label-muted =   %percentage%%
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ADP1

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-low = <ramp-capacity> <label-low>
format-low-foreground = ${colors.danger}
format-full = <ramp-capacity> <label-full>
format-full-foreground = ${colors.success}

label-full = FULL

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁻
ramp-capacity-3 = 󰁼
ramp-capacity-4 = 󰁽
ramp-capacity-5 = 󰁾
ramp-capacity-6 = 󰁿
ramp-capacity-7 = 󰂀
ramp-capacity-8 = 󰂁
ramp-capacity-9 = 󰂂
ramp-capacity-10 = 󰁹

animation-charging-0 = 󰢟
animation-charging-1 = 󰂆
animation-charging-2 = 󰢝
animation-charging-3 = 󰂊
animation-charging-4 = 󰂅
animation-charging-framerate = 750

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <ramp-signal>
format-connected-suffix = " "
format-disconnected = <label-disconnected>
format-disconnected-suffix = " "
format-disconnected-foreground = ${colors.danger}

label-disconnected = 󰤮

ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

[module/eth]
type = internal/network
interface-type = wired
interval = 5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = 󰈀
label-disconnected =

[module/systray]
type = internal/tray
tray-spacing = 8pt

[settings]
screenchange-reload = true
pseudo-transparency = true
